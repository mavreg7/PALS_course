name: Deploy Firestore rules

# Publishes firestore.rules to the live Firebase project automatically, so the
# rules never have to be pasted into the console by hand again.
#
# One-time setup: add a repository secret named FIREBASE_TOKEN.
#   1. Locally (with the Firebase CLI): firebase login:ci
#   2. Copy the token it prints.
#   3. GitHub repo → Settings → Secrets and variables → Actions → New
#      repository secret → name FIREBASE_TOKEN, value = the token.

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - '.github/workflows/deploy-firestore-rules.yml'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify FIREBASE_TOKEN is configured
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions (generate with 'firebase login:ci')."
            exit 1
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only firestore:rules --project pals-course --non-interactive --token "$FIREBASE_TOKEN"
