<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALS 2025 · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#0891B2;--primary-d:#0e7490;--primary-l:#e0f2fe;
  --instructor:#7C3AED;--student:#0891B2;
  --bg:#F0F9FF;--surface:#fff;--surface2:#f8fafc;
  --border:#e2e8f0;--text:#0f172a;--muted:#64748b;--faint:#94a3b8;
  --success:#22C55E;--danger:#EF4444;
  --shadow:0 4px 28px rgba(8,145,178,.12);--radius:14px;
}
[data-theme="dark"]{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273548;
  --border:#334155;--text:#e2e8f0;--muted:#94a3b8;--faint:#475569;
  --primary-l:#164e63;--shadow:0 4px 28px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Manrope',system-ui,sans-serif}
body{min-height:100vh;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;transition:background .3s,color .3s}
.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.18;z-index:0;pointer-events:none}
.blob1{width:420px;height:420px;background:#0891B2;top:-120px;left:-120px;animation:drift 16s ease-in-out infinite}
.blob2{width:380px;height:380px;background:#7C3AED;bottom:-100px;right:-80px;animation:drift 20s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,28px)}}
.content{position:relative;z-index:1;width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center}
.logo{width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,#0891B2,#34D399);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(8,145,178,.38);margin-bottom:1.2rem}
.logo svg{width:40px;height:40px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:2rem;font-weight:800;letter-spacing:-.5px;margin-bottom:.25rem}
.sub{font-size:.85rem;color:var(--muted);margin-bottom:2rem;font-weight:500}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);width:100%;padding:2rem;transition:background .3s,border-color .3s}
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.role-btn{padding:.9rem .5rem;border-radius:10px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;font-weight:700;font-size:.85rem;color:var(--muted);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;line-height:1}
.role-btn .icon{font-size:1.65rem}
.role-btn.sel[data-role="student"]{border-color:var(--student);background:rgba(8,145,178,.08);color:var(--student)}
.role-btn.sel[data-role="instructor"]{border-color:var(--instructor);background:rgba(124,58,237,.08);color:var(--instructor)}
.fl{margin-bottom:1rem}
.fl label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.35rem}
.field{width:100%;padding:.72rem 1rem;border:1.5px solid var(--border);border-radius:9px;font-size:.95rem;background:var(--surface2);color:var(--text);transition:border-color .2s,box-shadow .2s}
.field:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(8,145,178,.15)}
.btn-go{width:100%;padding:.88rem;border-radius:10px;font-weight:700;font-size:1rem;border:none;cursor:pointer;margin-top:.4rem;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff}
.btn-go.student{background:var(--student)}.btn-go.student:hover{background:var(--primary-d)}
.btn-go.instructor{background:var(--instructor)}.btn-go.instructor:hover{background:#6d28d9}
.err{background:rgba(239,68,68,.09);color:#dc2626;border:1px solid rgba(239,68,68,.22);border-radius:8px;padding:.65rem 1rem;font-size:.85rem;font-weight:600;margin-bottom:1rem;display:none}
.divider{height:1px;background:var(--border);margin:1.3rem 0}
.hints{display:flex;flex-direction:column;gap:.45rem}
.hint-row{display:flex;align-items:center;gap:.65rem;font-size:.8rem;color:var(--muted);background:var(--surface2);padding:.5rem .75rem;border-radius:8px;border:1px solid var(--border)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.creds{font-size:.73rem;color:var(--faint);text-align:center;margin-top:1.1rem;line-height:1.7}
.theme-btn{position:fixed;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);z-index:10;transition:all .2s}
.theme-btn:hover{background:var(--surface2)}
@media(max-width:400px){.card{padding:1.4rem}h1{font-size:1.6rem}}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode">
  <svg id="ti" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>

<div class="content">
  <div class="logo">
    <svg viewBox="0 0 40 40">
      <path d="M20 6 L20 34 M6 20 L34 20" stroke-width="4.5"/>
      <circle cx="20" cy="20" r="16" stroke-width="2.2"/>
    </svg>
  </div>
  <h1>PALS 2025</h1>
  <div class="sub">Pediatric Advanced Life Support · Provider Course</div>

  <div class="card">
    <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:.8rem">Sign in as</div>
    <div class="role-row">
      <button class="role-btn sel" data-role="student" onclick="pick('student')"><span class="icon">🎓</span>Student</button>
      <button class="role-btn" data-role="instructor" onclick="pick('instructor')"><span class="icon">👨‍🏫</span>Instructor</button>
    </div>
    <div id="err" class="err">Incorrect credentials. Please try again.</div>
    <div class="fl"><label for="un">Username</label><input class="field" id="un" type="text" autocomplete="username" placeholder="Enter username" onkeydown="if(event.key==='Enter')go()"></div>
    <div class="fl"><label for="pw">Password</label><input class="field" id="pw" type="password" autocomplete="current-password" placeholder="Enter password" onkeydown="if(event.key==='Enter')go()"></div>
    <button id="gbtn" class="btn-go student" onclick="go()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In as Student
    </button>
    <div class="divider"></div>
    <div class="hints">
      <div class="hint-row"><div class="dot" style="background:#0891B2"></div><strong>Students</strong> — modules, quizzes, progress, feedback</div>
      <div class="hint-row"><div class="dot" style="background:#7C3AED"></div><strong>Instructors</strong> — all content + roster, exams, eval tools, admin</div>
    </div>
    <div class="creds">Demo student: <strong>student / pals2025</strong><br>Demo instructor: <strong>instructor / teach2025</strong></div>
  </div>
</div>

<script>
const ACCTS=[
  {u:'instructor', p:'teach2025',  role:'instructor', name:'Lead Instructor', canAdmin:true},
  {u:'instructor2',p:'teach2025b', role:'instructor', name:'Co-Instructor',   canAdmin:false},
  {u:'student',    p:'pals2025',   role:'student',    name:'Student',         testsEnabled:false, rosterVisible:false, unlockedModules:'all'},
];
const SK='pals_sess_v1';
function saveSession(o){window.__sess=o;try{sessionStorage.setItem(SK,JSON.stringify(o))}catch(e){}}
function getSession(){if(window.__sess)return window.__sess;try{return JSON.parse(sessionStorage.getItem(SK)||'null')}catch(e){return null}}
(function(){const s=getSession();if(s&&s.role)redir(s.role);})();
let role='student';
function pick(r){
  role=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.toggle('sel',b.dataset.role===r));
  const b=document.getElementById('gbtn');
  b.className='btn-go '+r;
  b.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In as ${r==='student'?'Student':'Instructor'}`;
}
function go(){
  const u=document.getElementById('un').value.trim().toLowerCase();
  const p=document.getElementById('pw').value;
  const err=document.getElementById('err');err.style.display='none';
  const a=ACCTS.find(x=>x.u===u&&x.p===p&&x.role===role);
  if(!a){err.style.display='block';document.getElementById('pw').value='';document.getElementById('pw').focus();return;}
  saveSession({u:a.u,role:a.role,name:a.name,canAdmin:!!a.canAdmin,testsEnabled:!!a.testsEnabled,rosterVisible:!!a.rosterVisible,unlockedModules:a.unlockedModules||'all',t:Date.now()});
  redir(a.role);
}
function redir(r){window.location.href=r==='instructor'?'hub_instructor.html':'hub_student.html';}
let dark=window.matchMedia('(prefers-color-scheme:dark)').matches;applyTheme();
function toggleTheme(){dark=!dark;applyTheme();}
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('ti').innerHTML=dark
    ?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    :'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}
</script>
</body>
</html>
