<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALS 2025 · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="firebase-config.js"></script>
<style>
:root{
  --p:#0891B2;--pd:#0e7490;--pl:rgba(8,145,178,.1);
  --v:#7C3AED;--vl:rgba(124,58,237,.1);
  --bg:#f0f9ff;--s:#fff;--s2:#f8fafc;--b:#bae6fd;--b2:#e2e8f0;
  --t:#0f172a;--tm:#475569;--tf:#94a3b8;
  --sh:0 4px 28px rgba(8,145,178,.13);--r:16px;
  --tr:all .22s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#07131f;--s:#0d2137;--s2:#102a45;--b:#1a3a5c;--b2:#1e3a5f;
  --t:#e0f4fc;--tm:#7db8d4;--tf:#2d5f82;
  --sh:0 4px 28px rgba(0,0,0,.5);
  --pl:rgba(8,145,178,.18);--vl:rgba(124,58,237,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;transition:background .3s,color .3s;overflow-x:hidden}
.blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:.15;z-index:0;pointer-events:none;animation:drift 18s ease-in-out infinite}
.blob1{width:480px;height:480px;background:#0891B2;top:-140px;left:-100px}
.blob2{width:400px;height:400px;background:#7C3AED;bottom:-100px;right:-80px;animation-duration:22s;animation-direction:reverse}
.blob3{width:260px;height:260px;background:#34D399;bottom:20%;left:10%;opacity:.09;animation-duration:26s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(35px,25px) scale(1.04)}}
.wrap{position:relative;z-index:1;width:100%;max-width:430px;display:flex;flex-direction:column;align-items:center}
.logo-ring{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#0891B2,#34D399);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(8,145,178,.4),0 0 0 8px rgba(8,145,178,.1);margin-bottom:1.1rem;animation:pop .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.logo-ring svg{fill:none;stroke:#fff;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:1.9rem;font-weight:800;letter-spacing:-.5px;margin-bottom:.2rem}
.sub{font-family:'Instrument Serif',serif;font-size:.95rem;color:var(--tm);margin-bottom:2rem;font-style:italic}
.card{background:var(--s);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--b);width:100%;padding:1.75rem;animation:slideup .5s .15s cubic-bezier(.4,0,.2,1) both}
@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fl{margin-bottom:1rem}
.fl label{display:block;font-size:.72rem;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.35rem}
.field{width:100%;padding:.72rem 1rem;border:1.5px solid var(--b2);border-radius:9px;font-size:.93rem;background:var(--s2);color:var(--t);transition:var(--tr);font-family:'Inter',sans-serif}
.field:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(8,145,178,.15)}
.err{background:rgba(239,68,68,.09);color:#dc2626;border:1px solid rgba(239,68,68,.22);border-radius:8px;padding:.6rem .9rem;font-size:.83rem;font-weight:600;margin-bottom:.9rem;display:none;align-items:center;gap:.5rem}
.btn-go{width:100%;padding:.85rem;border-radius:11px;font-weight:700;font-size:.95rem;border:none;cursor:pointer;margin-top:.35rem;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;font-family:'Inter',sans-serif;position:relative;overflow:hidden;background:linear-gradient(135deg,#0891B2,#0284C7)}
.btn-go:hover{background:linear-gradient(135deg,#0e7490,#0369a1)}
.btn-go:active{transform:scale(.98)}
.btn-go:disabled{opacity:.6;cursor:not-allowed}
.div{height:1px;background:var(--b2);margin:1.3rem 0;position:relative}
.div span{position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);background:var(--s);padding:0 .75rem;font-size:.72rem;color:var(--tf);white-space:nowrap}
.hints{display:flex;flex-direction:column;gap:.4rem}
.hint{display:flex;align-items:center;gap:.6rem;font-size:.79rem;color:var(--tm);background:var(--s2);padding:.5rem .8rem;border-radius:8px;border:1px solid var(--b)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.theme-btn{position:fixed;top:1rem;right:1rem;background:var(--s);border:1px solid var(--b);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh);z-index:10;transition:var(--tr)}
.theme-btn:hover{background:var(--s2);transform:rotate(20deg)}
#auth-checking{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .3s}
#auth-checking.hidden{opacity:0;pointer-events:none}
.spinner{width:36px;height:36px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:400px){.card{padding:1.3rem}h1{font-size:1.55rem}}
</style>
</head>
<body>
<div id="auth-checking"><div class="spinner"></div></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode" id="thbtn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="thico">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>

<div class="wrap" id="login-wrap" style="display:none">
  <div class="logo-ring">
    <svg width="36" height="36" viewBox="0 0 36 36">
      <path d="M18 4 L18 32 M4 18 L32 18" stroke-width="4"/>
      <circle cx="18" cy="18" r="14" stroke-width="2"/>
      <circle cx="18" cy="18" r="7" stroke-width="1.5" stroke-dasharray="3 3"/>
    </svg>
  </div>
  <h1>PALS 2025</h1>
  <div class="sub">Pediatric Advanced Life Support — Provider Course</div>

  <div class="card">
    <div id="err" class="err">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="err-msg">Incorrect credentials. Please try again.</span>
    </div>

    <div class="fl">
      <label for="em">Email address</label>
      <input class="field" id="em" type="email" autocomplete="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
    </div>
    <div class="fl">
      <label for="pw">Password</label>
      <input class="field" id="pw" type="password" autocomplete="current-password" placeholder="Your password" onkeydown="if(event.key==='Enter')go()">
    </div>

    <button id="gbtn" class="btn-go" onclick="go()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span id="gbtn-txt">Sign In</span>
    </button>

    <div class="div"><span>Access levels</span></div>

    <div class="hints">
      <div class="hint">
        <div class="dot" style="background:#0891B2"></div>
        <span><strong>Students</strong> — modules, quizzes, progress &amp; certificate</span>
      </div>
      <div class="hint">
        <div class="dot" style="background:#7C3AED"></div>
        <span><strong>Instructors</strong> — roster, exams, eval tools &amp; admin controls</span>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
}                           from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  getFirestore, doc, getDoc, setDoc, serverTimestamp
}                           from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

const SK = 'pals_sess_v2';
const INSTRUCTOR_ROLES = ['admin', 'lead_instructor', 'instructor'];

// Write session to sessionStorage so hub pages can read it
function writeSession(uid, role, name, email) {
  const sess = { uid, role, name, email, ts: Date.now() };
  window.__pals_sess = sess;
  try { sessionStorage.setItem(SK, JSON.stringify(sess)); } catch(e) {}
}

function redir(role) {
  window.location.href = INSTRUCTOR_ROLES.includes(role)
    ? 'hub_instructor.html'
    : 'hub_student.html';
}

// Check if already signed in via Firebase
onAuthStateChanged(auth, async (fbUser) => {
  const overlay = document.getElementById('auth-checking');
  if (fbUser) {
    try {
      const snap = await getDoc(doc(db, 'users', fbUser.uid));
      if (snap.exists()) {
        const data = snap.data();
        const role = data.role || 'student';
        const name = data.displayName || data.name || fbUser.displayName || fbUser.email;
        writeSession(fbUser.uid, role, name, fbUser.email);
        redir(role);
        return;
      }
    } catch(e) {}
  }
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 350);
  document.getElementById('login-wrap').style.display = 'flex';
});

window.go = async function() {
  const email  = document.getElementById('em').value.trim();
  const pw     = document.getElementById('pw').value;
  const errEl  = document.getElementById('err');
  const btn    = document.getElementById('gbtn');
  const btnTxt = document.getElementById('gbtn-txt');
  errEl.style.display = 'none';

  if (!email || !pw) {
    document.getElementById('err-msg').textContent = 'Please enter your email and password.';
    errEl.style.display = 'flex'; return;
  }

  btn.disabled = true;
  btnTxt.textContent = 'Signing in…';

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    let role = 'student', name = cred.user.displayName || cred.user.email;
    try {
      const snap = await getDoc(doc(db, 'users', cred.user.uid));
      if (snap.exists()) {
        const data = snap.data();
        role = data.role || 'student';
        name = data.displayName || data.name || name;
        await setDoc(doc(db, 'users', cred.user.uid), { lastLogin: serverTimestamp() }, { merge: true });
      } else {
        document.getElementById('err-msg').textContent = 'Account found but no course profile exists. Contact your instructor.';
        errEl.style.display = 'flex';
        btn.disabled = false; btnTxt.textContent = 'Sign In';
        return;
      }
    } catch(e) {
      console.warn('Firestore read failed:', e.message);
    }
    writeSession(cred.user.uid, role, name, cred.user.email);
    redir(role);
  } catch(e) {
    const msgs = {
      'auth/user-not-found':     'No account found with that email.',
      'auth/wrong-password':     'Incorrect password. Please try again.',
      'auth/invalid-email':      'Please enter a valid email address.',
      'auth/user-disabled':      'This account has been disabled.',
      'auth/too-many-requests':  'Too many attempts — please wait a moment.',
      'auth/invalid-credential': 'Incorrect email or password.',
    };
    document.getElementById('err-msg').textContent = msgs[e.code] || 'Sign-in failed. Please try again.';
    errEl.style.display = 'flex';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
    btn.disabled = false; btnTxt.textContent = 'Sign In';
  }
};

let dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
function applyTheme(){
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('thico').innerHTML = dark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}
window.toggleTheme = function(){ dark = !dark; applyTheme(); };
applyTheme();
</script>
</body>
</html>
